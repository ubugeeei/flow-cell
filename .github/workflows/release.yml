name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  pack:
    name: Verify and Pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      package-name: ${{ steps.package.outputs.name }}
      package-version: ${{ steps.package.outputs.version }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify
        run: yarn verify

      - name: Check release tag
        id: package
        shell: bash
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.ref_name }}"

          if [ "$TAG" != "v$VERSION" ]; then
            echo "Release tag $TAG does not match package version v$VERSION" >&2
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          TARBALL="$(node -p "JSON.parse(require('fs').readFileSync('pack.json', 'utf8'))[0].filename")"
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      # actions/upload-artifact@v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-package
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: pack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ needs.pack.outputs.package-name }}/v/${{ needs.pack.outputs.package-version }}
    permissions:
      contents: read
      id-token: write

    steps:
      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # actions/download-artifact@v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-package

      - name: Verify tarball checksum
        shell: bash
        run: sha256sum --check *.tgz.sha256

      - name: Publish with npm trusted publishing
        run: npm publish ./*.tgz --access public

  github-release:
    name: Create GitHub Release
    needs:
      - pack
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists."
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
